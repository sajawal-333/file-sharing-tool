<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Uploaded</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>File Uploaded Successfully</h1>

    <p>Share this link:</p>
    <div class="download-link">
        <input type="text" id="download-link" value="{{ download_link }}" readonly>
        <button type="button" id="copy-btn">Copy</button>
    </div>

    {% if has_password %}
        <p class="note">This file is protected by a password.</p>
    {% else %}
        <p class="note">This file is not password protected.</p>
    {% endif %}

    <a class="back-link" href="{{ url_for('index') }}">Upload another file</a>
</div>

<script>
    const copyBtn = document.getElementById('copy-btn');
    const linkInput = document.getElementById('download-link');

    copyBtn.addEventListener('click', () => {
        linkInput.select();
        linkInput.setSelectionRange(0, 99999);
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(linkInput.value);
        } else {
            document.execCommand('copy');
        }
        copyBtn.textContent = 'Copied';
        setTimeout(() => copyBtn.textContent = 'Copy', 1500);
    });
</script>
</body>
</html>
